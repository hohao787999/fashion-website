<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>FASHION</h1>
    <nav id="nav"></nav>
  </header>

  <div id="adminPageRoot" style="max-width:1100px;margin:0 auto;padding:0 20px 60px">
    <h2 style="margin:20px 0">Admin - Manage Products & Orders</h2>

    <section style="margin-top:20px;background:#fff;padding:20px;border-radius:10px">
      <h3 style="margin-bottom:10px">Products</h3>

      <form id="adminProductForm" style="margin-bottom:20px">
        <input type="hidden" id="adminProductId" />
        <input id="adminProductName" placeholder="Name" />
        <input id="adminProductPrice" placeholder="Price" type="number" step="0.01" />
        <input id="adminProductCategory" placeholder="Category" />
        <textarea id="adminProductDescription" placeholder="Description"></textarea>
        <input id="adminProductImg" placeholder="Image URL (optional)" />
        <input id="adminProductStock" placeholder="Stock" type="number" step="1" />
        <button type="submit">Save product</button>
      </form>

      <div id="adminProductsList"></div>
    </section>

    <section style="margin-top:20px;background:#fff;padding:20px;border-radius:10px">
      <h3 style="margin-bottom:10px">Customers</h3>
      <p style="margin:8px 0">Total registered customers: <strong id="adminCustomerCount">0</strong></p>
      <input id="adminCustomerSearch" placeholder="Search by id or name" style="width:100%;padding:8px;margin-bottom:10px;border:1px solid #ccc;border-radius:4px" />
      <div id="adminCustomersList"></div>
    </section>

    <section style="margin-top:20px;background:#fff;padding:20px;border-radius:10px">
      <h3 style="margin-bottom:10px">Contacts</h3>
      <div id="adminContactsList"></div>
    </section>

    <section style="margin-top:20px;background:#fff;padding:20px;border-radius:10px">
      <h3 style="margin-bottom:10px">Orders</h3>
      <div id="adminOrdersList"></div>
    </section>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
